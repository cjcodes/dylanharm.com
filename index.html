
<!doctype html>
<html>
<head>
<title>Dylan Harm</title>
<style type="text/css">
@font-face {
    font-family: 'hillhouse';
    src: url('fonts/hill_house-webfont.eot');
    src: url('fonts/hill_house-webfont.eot?#iefix') format('embedded-opentype'),
         url('fonts/hill_house-webfont.woff') format('woff'),
         url('fonts/hill_house-webfont.ttf') format('truetype'),
         url('fonts/hill_house-webfont.svg#fonts/hill_houseregular') format('svg');
    font-weight: normal;
    font-style: normal;
}
body {
    font-family: 'hillhouse';
    text-transform: uppercase;
    color: #111;
    background: #6D281B;
}
h1 {
    font-size: 6em;
    text-align: center;
    width: 600px;
    position: absolute;
    top: 50%;
    margin-top: -.85em;
    left: 50%;
    margin-left: -300px;
    background: #6D281B;
    z-index: 10;
    font-weight: normal;
}
hr {
    position: absolute;
    top: 50%;
    border-top-width: 8px;
    border-bottom: 0;
    border-color: #111;
    left: 50%;
    margin-left: -26em;
}

.top    { margin-top: -4em;  width: 52em; }
.middle { margin-top: -2.75em; width: 56em; margin-left: -28em; }
.bottom { margin-top: -1.5em;    width: 52em; }
</style>
</head>
<body>
<h1>Dylan Harm</h1>
<hr class="top" />
<hr class="middle" />
<hr class="bottom" />
</body>
</html>
